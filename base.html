<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}LungAI{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
    nav { background: #1e3a8a; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 54px; }
    .brand { color: white; font-size: 1.1rem; font-weight: 700; }
    .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.9rem; margin-left: 0.25rem; }
    .nav-links a:hover { background: rgba(255,255,255,0.15); color: white; }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
    .card { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
    .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: #1e3a8a; }
    footer { text-align: center; padding: 1.5rem; color: #94a3b8; font-size: 0.8rem; border-top: 1px solid #e2e8f0; margin-top: 1rem; }
  </style>
  {% block style %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand"> LungAI — Lung Disease Detection</span>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/predict/">Predict</a>
    <a href="/results/">Results</a>
    <a href="/about/">About</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer> LungAI — AI-Based Lung Disease Detection | Final Year Project | Python · Scikit-learn · Django</footer>
</body>
</html>
